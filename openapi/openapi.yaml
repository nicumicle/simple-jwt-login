paths:
  /autologin:
    get:
      tags:
        - login_user
      summary: Auto-login user into WordPress
      description: |
        Validates the supplied JWT, resolves the matching WordPress user, and redirects the
        browser to the site (or to `redirectUrl` if provided and allowed by settings).

        **Requirements**
        - Auto-login must be enabled in the plugin settings.
        - The JWT must be valid, not expired, and not revoked.
        - If "Auto-Login Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
        - The calling IP must pass any IP allow-list configured in the plugin settings.

        **JWT delivery**
        The JWT can be supplied via:
        - `JWT` query parameter (default)
        - `JWT` in request body
        - `Authorization: Bearer <token>` header (when enabled in plugin General Settings)
        - Cookie or session (when enabled in plugin General Settings)

        **Success behaviour**
        The response is an HTTP redirect (302) to the WordPress home URL or the custom
        `redirectUrl`. The browser session is authenticated as the resolved user.
      operationId: autologin
      security:
        - BearerAuth: []
        - QueryJWT: []
      parameters:
        - name: JWT
          in: query
          description: |
            A valid signed JWT identifying the WordPress user to log in.
            Alternative to the `Authorization: Bearer` header.
          required: false
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          schema:
            type: string
        - name: AUTH_CODE
          in: query
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Auto-Login Requires Auth Code" is enabled in the plugin settings.
          schema:
            type: string
        - name: redirectUrl
          in: query
          example: "https://simplejwtlogin.com"
          description: |
            Overrides the redirect URL configured in the plugin settings. The "Allow redirect
            URL override" option must be enabled for this parameter to take effect.
          schema:
            type: string
      responses:
        '200':
          description: |
            Login successful. The browser is redirected to the WordPress website. The response
            body is empty HTML; the redirect is handled via HTTP headers.
          content:
            application/html:
              example: ""
        '400':
          description: |
            Bad request. Returned for unclassified errors not covered by more specific
            status codes (e.g. malformed JWT encoding, JSON encode/decode failures).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid JWT."
                  error_code: 25
        '401':
          description: |
            Unauthorized. The JWT is structurally invalid, has an unsupported algorithm, has
            a bad signature, is expired, has not-before/issued-at violations, is revoked, or
            the provided auth code is wrong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT has expired."
                  error_code: 14
        '403':
          description: |
            Forbidden. Auto-login is disabled in the plugin settings, or the client IP
            address is not on the allow-list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Auto-login is not enabled."
                  error_code: 26
        '404':
          description: The WordPress user identified by the JWT payload could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 24
        '500':
          description: |
            Internal server error. Typically caused by an OpenSSL signing/verification
            failure or an unexpected internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /users:
    post:
      tags:
        - register_user
      summary: Register a new WordPress user
      description: |
        Creates a new WordPress user account. At minimum, `email` and `password` must be
        supplied. All standard WordPress user fields (display name, locale, etc.) are
        accepted and passed to `wp_insert_user()`.

        **Requirements**
        - User registration must be enabled in the plugin settings.
        - If "Register Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
        - The calling IP must pass any IP allow-list configured in the plugin settings.
        - The email address must be unique and well-formed.
        - If email domain restrictions are configured, the domain must match.

        **Success behaviour**
        Returns the new user's profile object, their roles, and optionally a JWT if
        "Generate JWT on register" is enabled in the plugin settings.
      requestBody:
        description: New user data. `email` and `password` are required; all other fields are optional.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerUserBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/registerUserBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/registerUserBody'
        required: true
      responses:
        '200':
          description: User registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                    description: Action status.
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: New user ID.
                        example: 1
                      login:
                        type: string
                        example: "myuser"
                      nicename:
                        type: string
                        example: "myuser"
                      email:
                        type: string
                        example: "myuser@simplejwtlogin.com"
                      url:
                        type: string
                        description: User URL. Empty string when not set.
                        example: ""
                      registered:
                        type: string
                        example: "2021-01-01 23:31:50"
                      activation_key:
                        type: string
                        description: Password reset key. Empty string when not set.
                        example: ""
                      status:
                        type: string
                        example: "0"
                      display_name:
                        type: string
                        example: "myuser"
                      roles:
                        type: array
                        items:
                          type: string
                          example: "subscriber"
                      jwt:
                        type: string
                        nullable: true
                        description: Only present when "Generate JWT on register" is enabled.
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        '400':
          description: |
            Bad request. Missing required fields (`email` or `password`), or an unclassified
            validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "The email address or password is missing."
                  error_code: 35
        '401':
          description: |
            Unauthorized. The provided auth code is invalid or missing when required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid auth code."
                  error_code: 32
        '403':
          description: |
            Forbidden. User registration is disabled in the plugin settings, or the client
            IP address is not on the allow-list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Register is not allowed."
                  error_code: 31
        '409':
          description: A WordPress user with the provided email address already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User already exists."
                  error_code: 38
        '422':
          description: |
            Unprocessable entity. The email address format is invalid, or the email domain
            is not permitted by the plugin's domain allow-list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "The email address is invalid."
                  error_code: 36
        '500':
          description: |
            Internal server error. WordPress `wp_insert_user()` returned an error, or an
            unexpected internal failure occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User could not be created."
                  error_code: 52
    delete:
      tags:
        - delete_user
      summary: Delete a WordPress user
      description: |
        Permanently deletes the WordPress user identified by the JWT payload. The JWT is
        decoded to extract the user identifier (email, ID, or login, depending on plugin
        settings), the user is looked up, and `wp_delete_user()` is called.

        **Requirements**
        - User deletion must be enabled in the plugin settings.
        - The JWT must be valid, not expired, and not revoked.
        - If "Delete Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
        - The calling IP must pass any IP allow-list configured in the plugin settings.
      operationId: deleteUser
      parameters:
        - name: JWT
          in: query
          description: A valid signed JWT identifying the WordPress user to delete.
          required: true
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          schema:
            type: string
        - name: AUTH_CODE
          in: query
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Delete User Requires Auth Code" is enabled in the plugin settings.
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        description: Confirmation message.
                        example: User was successfully deleted.
        '400':
          description: |
            Bad request. The JWT parameter is missing or cannot be decoded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT is missing."
                  error_code: 42
        '401':
          description: |
            Unauthorized. The JWT is structurally invalid, has a bad signature, is expired,
            is revoked, or the provided auth code is wrong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT has expired."
                  error_code: 14
        '403':
          description: |
            Forbidden. User deletion is disabled in the plugin settings, or the client IP
            address is not on the allow-list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Delete is not enabled."
                  error_code: 39
        '404':
          description: The WordPress user identified by the JWT payload could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 24
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /user/reset_password:
    post:
      tags:
        - reset_password
      operationId: sendResetPasswordCode
      summary: Send reset password email
      description: |
        Sends a one-time reset code to the user's registered email address. The code must
        then be supplied to `PUT /user/reset_password` together with the new password.

        **Requirements**
        - Password reset must be enabled in the plugin settings.
        - If "Reset Password Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
        - The email address must belong to an existing WordPress user.

        **Flow**
        1. Call `POST /user/reset_password` with `email` (and `AUTH_CODE` if required).
        2. The user receives an email containing a one-time `code`.
        3. Call `PUT /user/reset_password` with `email`, `code`, and `new_password`.
      requestBody:
        description: Email address of the account whose password should be reset.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resetPasswordBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/resetPasswordBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/resetPasswordBody'
        required: true
      responses:
        '200':
          description: Reset password email sent successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Reset password email has been sent.
        '400':
          description: |
            Bad request. The `email` field is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Email is required."
                  error_code: 59
        '401':
          description: |
            Unauthorized. The provided auth code is invalid or missing when required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid auth code."
                  error_code: 58
        '403':
          description: |
            Forbidden. Password reset is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Reset password is not allowed."
                  error_code: 56
        '404':
          description: No WordPress user with the provided email address was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 64
        '500':
          description: Internal server error (e.g. email sending failure).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
    put:
      tags:
        - reset_password
      operationId: changeUserPassword
      summary: Change user password
      description: |
        Sets a new password for the user. Two authentication modes are supported:

        **Code-based (default)**
        Provide `email`, the one-time `code` received by email (from `POST /user/reset_password`),
        and `new_password`.

        **JWT-based (optional)**
        When "Allow Reset Password with JWT" is enabled in the plugin settings, provide a
        valid `JWT` and `new_password`. The `code` field is not required in this mode.
        Note: JWTs that were themselves issued via a reset-password flow cannot be reused
        to change a password again.

        **Requirements**
        - Password reset must be enabled in the plugin settings.
        - If "Reset Password Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
      requestBody:
        description: New password plus either a one-time code or a valid JWT for authentication.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/changePasswordBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/changePasswordBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/changePasswordBody'
        required: true
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: User password has been changed.
        '400':
          description: |
            Bad request. One or more required fields are missing (`email`, `code`,
            or `new_password`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "New password is required."
                  error_code: 61
        '401':
          description: |
            Unauthorized. The JWT is invalid or expired, the JWT was issued via a
            password-reset flow and cannot be reused to change a password, or the
            provided auth code is wrong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "This JWT cannot be used to change the password."
                  error_code: 93
        '403':
          description: |
            Forbidden. Password reset is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Reset password is not allowed."
                  error_code: 56
        '404':
          description: No WordPress user with the provided email address was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 64
        '422':
          description: |
            Unprocessable entity. The one-time reset code is invalid or expired, or the
            reset flow configuration is inconsistent (e.g. JWT-based reset is disabled
            but no code was supplied).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid reset password code."
                  error_code: 62
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /auth:
    post:
      tags:
        - authenticate_user
      summary: Authenticate and obtain a JWT
      description: |
        Validates the user's WordPress credentials and returns a signed JWT. An optional
        refresh token is also returned when the refresh-token feature is enabled in the
        plugin settings.

        **Credentials**
        Supply either `email` or `username` (not both), plus one of:
        - `password` — plaintext password (verified with `wp_check_password`)
        - `password_hash` — the hashed password as stored in the WordPress database
          (must be enabled in the plugin settings)

        **Requirements**
        - Authentication must be enabled in the plugin settings.
        - If "Authentication Requires Auth Code" is enabled, `AUTH_CODE` must be provided.

        **Two-Factor Authentication**
        When the authenticated user has Two-Factor Authentication enabled and the 2FA
        integration is active, the endpoint returns HTTP 200 with a challenge response
        instead of a regular JWT. The `two_factor_required` field is `true` and `jwt`
        contains a short-lived interim token. Submit that interim token together with the
        2FA code to `POST /auth/2fa` to obtain the final JWT.
      operationId: getJWT
      requestBody:
        description: User credentials.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/authBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/authBody'
        required: true
      responses:
        '200':
          description: |
            Authentication successful. Returns a signed JWT and an optional refresh token.

            **Two-Factor challenge**: when the user has 2FA enabled, this response is
            returned instead of a regular JWT. `two_factor_required` will be `true` and
            `jwt` will contain a short-lived interim token. Submit it with the 2FA code
            to `POST /auth/2fa` to obtain the final JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Action status.
                    example: true
                  data:
                    type: object
                    properties:
                      jwt:
                        type: string
                        description: |
                          Signed JWT for use in subsequent requests, or a short-lived
                          interim JWT when `two_factor_required` is `true`.
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                      refresh_token:
                        type: string
                        nullable: true
                        description: |
                          Opaque refresh token for obtaining new JWTs without re-authenticating.
                          Only present when the refresh-token feature is enabled and 2FA is
                          not required.
                        example: "a1b2c3d4e5f678901234567890123456789012345678901234567890123456789012"
                      two_factor_required:
                        type: boolean
                        nullable: true
                        description: |
                          Present and `true` only when Two-Factor Authentication is required.
                          When set, `jwt` is an interim token; complete authentication via
                          `POST /auth/2fa`.
                        example: true
                      provider:
                        type: string
                        nullable: true
                        description: |
                          Fully-qualified class name of the user's primary 2FA provider.
                          Only present when `two_factor_required` is `true`.
                        example: "Two_Factor_Totp"
        '400':
          description: |
            Bad request. `email` (or `username`) or `password` (or `password_hash`) is
            missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Email or username is required."
                  error_code: 46
        '401':
          description: |
            Unauthorized. The provided credentials are incorrect, or the auth code is
            invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Wrong user credentials."
                  error_code: 48
        '403':
          description: |
            Forbidden. Authentication is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Authentication is not enabled."
                  error_code: 45
        '500':
          description: |
            Internal server error. Typically an OpenSSL signing failure when generating
            the JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 16
  /auth/refresh:
    post:
      tags:
        - authenticate_user
      summary: Refresh an expired JWT
      description: |
        Exchanges a valid refresh token for a new JWT (and a new refresh token). The
        original refresh token is invalidated after use.

        **Requirements**
        - The refresh-token feature must be enabled in the plugin settings.
        - The refresh token must exist in the database and not have exceeded the maximum
          token age configured in the plugin settings.
        - If "Authentication Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
      operationId: refreshJWT
      requestBody:  
        description: Refresh token obtained from a prior `/auth` response.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authRefreshBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/authRefreshBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/authRefreshBody'
        required: true
      responses:
        '200':
          description: JWT refreshed successfully. Returns a new JWT and a new refresh token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Action status.
                    example: true
                  data:
                    type: object
                    properties:
                      jwt:
                        type: string
                        description: Newly issued JWT.
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                      refresh_token:
                        type: string
                        description: New refresh token replacing the one that was consumed.
                        example: "f6e7g8h9i0j123456789012345678901234567890123456789012345678901234567"
        '400':
          description: |
            Bad request. The `refresh_token` field is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Refresh token is missing."
                  error_code: 51
        '401':
          description: |
            Unauthorized. The refresh token is not found in the database, the associated
            JWT is malformed or structurally invalid, or the token has exceeded the maximum
            allowed age.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Refresh token is too old."
                  error_code: 50
        '403':
          description: |
            Forbidden. The refresh-token feature is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Refresh token is not enabled."
                  error_code: 81
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /auth/validate:
    get:
      tags:
        - authenticate_user
      summary: Validate a JWT and retrieve user details
      description: |
        Verifies the JWT signature, checks expiry and revocation status, and returns the
        decoded token information together with the matching WordPress user profile and roles.

        **JWT delivery**
        The JWT can be passed via:
        - `JWT` query parameter
        - `Authorization: Bearer <token>` header (when enabled in plugin General Settings)
        - Cookie or session (when enabled in plugin General Settings)

        **Requirements**
        - Token validation must be enabled in the plugin settings.
        - If "Authentication Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
      operationId: validateJWT
      security:
        - BearerAuth: []
        - QueryJWT: []
      parameters:
        - name: JWT
          in: query
          description: "The JWT to validate. Alternative to the `Authorization: Bearer` header."
          required: false
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          schema:
            type: string
        - name: AUTH_CODE
          in: query
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
          schema:
            type: string
      responses:
        '200':
          description: JWT is valid. Returns the decoded token and the associated WordPress user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          ID:
                            type: string
                            example: "1"
                          user_login:
                            type: string
                            example: "myuser"
                          user_nicename:
                            type: string
                            example: "myuser"
                          user_email:
                            type: string
                            example: "myuser@simplejwtlogin.com"
                          user_url:
                            type: string
                            example: "https://simplejwtlogin.com/myuser"
                          user_registered:
                            type: string
                            example: "2021-01-01 23:31:50"
                          user_activation_key:
                            type: string
                            example: ""
                          user_status:
                            type: string
                            example: "0"
                          display_name:
                            type: string
                            example: "myuser"
                      roles:
                        type: array
                        items:
                          type: string
                          example: "administrator"
                      jwt:
                        type: object
                        properties:
                          token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                          header:
                            type: object
                            properties:
                              typ:
                                type: string
                                example: "JWT"
                              alg:
                                type: string
                                example: "HS256"
                          payload:
                            type: object
                            properties:
                              iat:
                                type: number
                                description: Issued-at timestamp. Always present.
                                example: 1516239022
                              exp:
                                type: number
                                nullable: true
                                description: Expiry timestamp. Present only when the `exp` payload parameter is enabled in plugin settings.
                                example: 1516242622
                              email:
                                type: string
                                nullable: true
                                description: User email. Present only when enabled in plugin settings.
                                example: "myuser@simplejwtlogin.com"
                              id:
                                type: number
                                nullable: true
                                description: WordPress user ID. Present only when enabled in plugin settings.
                                example: 1
                              site:
                                type: string
                                nullable: true
                                description: Site URL. Present only when enabled in plugin settings.
                                example: "https://simplejwtlogin.com"
                              username:
                                type: string
                                nullable: true
                                description: WordPress login username. Present only when enabled in plugin settings.
                                example: "myuser"
                              iss:
                                type: string
                                nullable: true
                                description: Issuer claim. Present only when enabled in plugin settings.
                                example: "https://simplejwtlogin.com"
                          expire_in:
                            type: integer
                            nullable: true
                            description: |
                              Seconds until the JWT expires (`exp - now`). Only present
                              when the JWT payload contains an `exp` claim.
                            example: 3600
        '400':
          description: |
            Bad request. The `JWT` parameter is missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT is missing."
                  error_code: 53
        '401':
          description: |
            Unauthorized. The JWT is structurally invalid, has a bad signature, is expired,
            or has been revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT has expired."
                  error_code: 14
        '403':
          description: |
            Forbidden. JWT validation is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Validate token is not enabled."
                  error_code: 82
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
    post:
      tags:
        - authenticate_user
      summary: Validate a JWT and retrieve user details (POST variant)
      description: |
        Identical to `GET /auth/validate` but accepts the JWT in the request body instead of
        as a query parameter. Use this variant when the JWT is too long for a URL, or when
        sending it in the body is preferred for security reasons.

        **JWT delivery**
        The JWT can be passed via:
        - `JWT` field in the request body
        - `Authorization: Bearer <token>` header (when enabled in plugin General Settings)
      operationId: validateJWTPost
      security:
        - BearerAuth: []
      requestBody:
        description: JWT to validate.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/validateBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/validateBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/validateBody'
        required: true
      responses:
        '200':
          description: JWT is valid. Returns the decoded token and the associated WordPress user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Same structure as the GET /auth/validate 200 response.
        '400':
          description: |
            Bad request. The `JWT` field is missing from the request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '401':
          description: |
            Unauthorized. The JWT is structurally invalid, has a bad signature, is expired,
            or has been revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '403':
          description: |
            Forbidden. JWT validation is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /auth/revoke:
    post:
      tags:
        - authenticate_user
      summary: Revoke a JWT
      description: |
        Marks the provided JWT as revoked in the database. Once revoked, the token is
        rejected by all plugin endpoints that check for revocation (autologin, validate,
        refresh, etc.).

        **JWT delivery**
        The JWT to revoke can be passed via:
        - `JWT` field in the request body
        - `Authorization: Bearer <token>` header (when enabled in plugin General Settings)

        **Requirements**
        - Token revocation must be enabled in the plugin settings.
        - The JWT must be structurally valid (it does not need to be un-expired).
        - If "Authentication Requires Auth Code" is enabled, `AUTH_CODE` must be provided.
      operationId: revokeJWT
      security:
        - BearerAuth: []
      requestBody:
        description: The JWT to revoke, plus optional auth code.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/authRevokeBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/authRevokeBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/authRevokeBody'
        required: true
      responses:
        '200':
          description: Token revoked successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Action status.
                    example: true
                  message:
                    type: string
                    description: Confirmation message.
                    example: "Token was revoked."
                  data:
                    type: object
                    properties:
                      jwt:
                        type: array
                        description: Array containing the revoked JWT string.
                        items:
                          type: string
                          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        '400':
          description: |
            Bad request. The `JWT` field is missing from the request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT is missing."
                  error_code: 42
        '401':
          description: |
            Unauthorized. The JWT is structurally invalid, has a bad signature, or the
            provided auth code is wrong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "JWT signature verification failed."
                  error_code: 11
        '403':
          description: |
            Forbidden. Token revocation is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Revoke token is not enabled."
                  error_code: 83
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /auth/2fa:
    post:
      tags:
        - authenticate_user
      summary: Verify Two-Factor Authentication code
      description: |
        Completes the Two-Factor Authentication challenge issued by `POST /auth`. When
        credentials are valid but the user has 2FA enabled, `POST /auth` returns an interim
        JWT (`two_factor_required: true`). This endpoint accepts that interim token together
        with the user's 2FA code and, on success, returns the final signed JWT.

        **Requirements**
        - Authentication must be enabled in the plugin settings.
        - The Two-Factor Authentication plugin must be installed and active.
        - The interim JWT must be provided via the `Authorization: Bearer` header or the
          `JWT` body field.
        - The `code` field must contain the TOTP code, email token, or backup code,
          depending on the user's configured 2FA provider.

        **JWT delivery**
        The interim JWT can be passed via:
        - `JWT` field in the request body
        - `Authorization: Bearer <token>` header (when enabled in plugin General Settings)
      operationId: verifyTwoFactor
      security:
        - BearerAuth: []
      requestBody:
        description: Interim JWT and 2FA verification code.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/twoFactorVerifyBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/twoFactorVerifyBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/twoFactorVerifyBody'
      responses:
        '200':
          description: 2FA verification successful. Returns a signed JWT and optional refresh token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      jwt:
                        type: string
                        description: Signed JWT for use in subsequent requests.
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                      refresh_token:
                        type: string
                        nullable: true
                        description: |
                          Opaque refresh token. Only present when the refresh-token feature
                          is enabled in the plugin settings.
                        example: "a1b2c3d4e5f678901234567890123456789012345678901234567890123456789012"
        '400':
          description: |
            Bad request. One of:
            - The Two-Factor Authentication plugin is not active (`error_code` 105).
            - The interim JWT payload is missing required 2FA claims (`error_code` 106).
            - The 2FA session nonce is invalid or expired (`error_code` 107).
            - Too many failed attempts - rate limited (`error_code` 108).
            - The 2FA code is incorrect (`error_code` 109).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid two-factor code."
                  error_code: 109
        '403':
          description: |
            Forbidden. Authentication is disabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Authentication is not enabled."
                  error_code: 45
        '404':
          description: The WordPress user referenced by the interim JWT could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 24
        '422':
          description: |
            Unprocessable entity. The interim JWT is missing from the request (not supplied
            via `Authorization: Bearer` header or `JWT` body field).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Interim JWT is missing."
                  error_code: 42
        '500':
          description: |
            Internal server error. Typically an OpenSSL signing failure when generating
            the final JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /oauth/token:
    get:
      tags:
        - oauth
      summary: Exchange OAuth authorization code for a WordPress JWT (GET)
      description: |
        Browser-redirect flow: exchanges a provider authorization code for a WordPress
        session and redirects the browser to the WordPress admin (or login page on failure).
        The provider must be enabled in the plugin settings.

        Supported providers: `google`, `auth0`, `facebook`, `github`.

        **Google flow** — pass `provider=google` with `code`.

        **Auth0 flow** — pass `provider=auth0` with `code`.

        **Facebook flow** — pass `provider=facebook` with `code`.

        **GitHub flow** — pass `provider=github` with `code`.

        If the OAuth identity matches an existing WordPress user (by email), the user is
        logged in. If no match is found and "Register on OAuth login" is enabled, a new
        user is created automatically. On failure the browser is redirected to the
        WordPress login page.

        > **Note**: this endpoint is designed for browser redirect callbacks (OAuth consent
        > screen redirect_uri). To obtain a JWT programmatically, use `POST /oauth/token`
        > instead.
      operationId: oauthTokenGet
      parameters:
        - name: provider
          in: query
          required: true
          description: OAuth provider slug.
          schema:
            type: string
            enum: [google, auth0, facebook, github]
          example: google
        - name: code
          in: query
          description: Authorization code returned by the OAuth provider's consent screen.
          schema:
            type: string
        - name: AUTH_CODE
          in: query
          description: Required when "Authentication Requires Auth Code" is enabled.
          schema:
            type: string
      responses:
        '200':
          description: |
            Browser redirected to the WordPress admin URL after a successful login,
            or to the WordPress login page on failure. The response body is empty HTML.
          content:
            application/html:
              example: ""
        '400':
          description: |
            Bad request. The `code` parameter is missing, or the provider slug is
            unrecognised. (`error_code` 69 for invalid provider slug.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "The Oauth provider is invalid."
                  error_code: 69
        '403':
          description: |
            Forbidden. The requested OAuth provider is not enabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "This Oauth provider is not available."
                  error_code: 70
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
    post:
      tags:
        - oauth
      summary: Exchange OAuth token for a WordPress JWT (POST)
      description: |
        API flow: exchanges a provider-issued token for a WordPress JWT and returns the
        WordPress user profile. Use this variant for programmatic API clients. The provider
        must be enabled in the plugin settings.

        Supported providers: `google`, `auth0`, `facebook`, `github`.

        **Google** — supply `code` (authorization code) or `id_token` (Google Sign-In ID
        token). The `id_token` path returns a WordPress JWT directly; the `code` path
        returns the raw Google token response for the client to handle.

        **Auth0** — supply `code` (authorization code).

        **Facebook** — supply `access_token` (Facebook user access token). Returns a
        WordPress JWT.

        **GitHub** — supply `access_token` (GitHub user access token). Returns a
        WordPress JWT.

        If the OAuth identity matches an existing WordPress user (by email), a WordPress
        JWT is returned. If no match is found and "Register on OAuth login" is enabled, a
        new user is created automatically.
      operationId: oauthTokenPost
      requestBody:
        description: OAuth provider and authorization code, ID token, or access token.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/oauthBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/oauthBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/oauthBody'
        required: true
      responses:
        '200':
          description: OAuth login successful. Returns the WordPress user and a JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthResponse'
        '400':
          description: |
            Bad request. One of:
            - The `provider` slug is unrecognised (`error_code` 69).
            - Required parameters are missing — `code` for Google/Auth0/Facebook/GitHub,
              or `id_token` for Google, or `access_token` for Facebook/GitHub
              (`error_code` 71 Google, 75 Auth0, 97 Facebook, 101 GitHub).
            - The authorization code or access token was rejected by the provider
              (`error_code` 72 Google code, 79 Auth0 code, 98 Facebook code, 102 GitHub
              code; or 73 Google id_token, 80 Auth0 token, 99 Facebook token, 103 GitHub
              token).
            - The OAuth identity email did not match any WordPress user and auto-register
              is disabled — Facebook (`error_code` 100) or GitHub (`error_code` 104).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "The code or access_token parameter is missing from request."
                  error_code: 97
        '401':
          description: |
            Unauthorized. The Google `id_token` or Auth0 token is invalid or rejected by
            the provider (`error_code` 73, 80).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "The provided id_token is invalid."
                  error_code: 73
        '403':
          description: |
            Forbidden. The requested OAuth provider is not enabled in the plugin settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "This Oauth provider is not available."
                  error_code: 70
        '404':
          description: |
            The Google or Auth0 identity email does not match any WordPress user and
            automatic registration is disabled (`error_code` 74 Google, 78 Auth0).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "User not found."
                  error_code: 74
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "An unexpected error occurred."
                  error_code: 22
  /api-keys:
    get:
      tags:
        - api_keys
      summary: List API keys
      description: |
        Returns a paginated list of API keys owned by the authenticated WordPress user.
        Administrators (`manage_options` capability) see all keys across all users.
        Regular users see only their own keys.

        The full key value is never returned; only the first 8-character prefix is shown
        (followed by `****`) to help identify keys without exposing secrets.

        **Requirements**
        - An active WordPress session is required (cookie-based auth or equivalent).
      operationId: listApiKeys
      security:
        - WordPressSession: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Number of results per page (1–100). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: Paginated list of API keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiKeyItem'
                      total:
                        type: integer
                        description: Total number of matching keys.
                        example: 5
                      page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 20
        '401':
          description: |
            Unauthorized. No active WordPress session. Log in to WordPress before calling
            this endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You must be logged in to manage API keys."
                  error_code: 84
    post:
      tags:
        - api_keys
      summary: Create an API key
      description: |
        Generates a new API key for the authenticated WordPress user. The full key value
        (`sjl_` prefix + 32 hex characters) is returned **only in this response** — it
        cannot be retrieved again. Store it securely immediately.

        **Permissions**
        One or more of: `read`, `create`, `update`, `delete`. These map to the HTTP methods
        the key may be used to authenticate: GET, POST, PUT/PATCH, and DELETE respectively.

        **Requirements**
        - An active WordPress session is required.
        - `name` is required and must be non-empty.
        - At least one permission must be specified.
      operationId: createApiKey
      security:
        - WordPressSession: []
      requestBody:
        description: API key definition.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createApiKeyBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/createApiKeyBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/createApiKeyBody'
      responses:
        '200':
          description: |
            API key created. The `key` field contains the full plaintext key — save it now
            as it will not be returned again.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Database ID of the newly created key.
                        example: 7
                      key:
                        type: string
                        description: Full plaintext API key. Store securely — shown only once.
                        example: "sjl_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
                      name:
                        type: string
                        example: "My integration key"
                      key_prefix:
                        type: string
                        description: First 8 characters of the key, for identification.
                        example: "sjl_a1b2"
                      permissions:
                        type: array
                        items:
                          type: string
                          enum: [read, create, update, delete]
                        example: ["read", "create"]
                      expires_at:
                        type: string
                        nullable: true
                        description: Expiry timestamp in `Y-m-d H:i:s` format, or null for no expiry.
                        example: "2027-01-01 00:00:00"
        '400':
          description: |
            Bad request. `name` is empty, no permissions were provided, or a permission
            value is unrecognised.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "API key name is required."
                  error_code: 85
        '401':
          description: |
            Unauthorized. No active WordPress session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You must be logged in to manage API keys."
                  error_code: 84
        '500':
          description: |
            Internal server error. The database insert for the new API key failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Failed to create API key."
                  error_code: 88
  /api-keys/{id}:
    put:
      tags:
        - api_keys
      summary: Update an API key
      description: |
        Updates the `name`, `permissions`, and/or `expires_at` of an existing API key.
        Regular users may only update their own keys. Administrators (`manage_options`)
        may update any key.
      operationId: updateApiKey
      security:
        - WordPressSession: []
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric ID of the API key to update.
          schema:
            type: integer
          example: 7
      requestBody:
        description: Updated API key fields.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateApiKeyBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/updateApiKeyBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/updateApiKeyBody'
      responses:
        '200':
          description: API key updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API key updated successfully."
        '400':
          description: |
            Bad request. `name` is empty, no permissions were provided, or a permission
            value is unrecognised.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "API key name is required."
                  error_code: 85
        '401':
          description: |
            Unauthorized. No active WordPress session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You must be logged in to manage API keys."
                  error_code: 84
        '403':
          description: |
            Forbidden. The authenticated user does not own this API key and does not have
            administrator privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You are not allowed to manage this API key."
                  error_code: 84
        '404':
          description: No API key with the provided ID was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid API key ID."
                  error_code: 89
        '500':
          description: |
            Internal server error. The database update for the API key failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Failed to update API key."
                  error_code: 90
    delete:
      tags:
        - api_keys
      summary: Permanently delete an API key
      description: |
        Permanently removes the API key record from the database. This action is
        irreversible. To merely disable a key while keeping its record, use
        `POST /api-keys/{id}/revoke` instead.

        Regular users may only delete their own keys. Administrators may delete any key.
      operationId: deleteApiKey
      security:
        - WordPressSession: []
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric ID of the API key to permanently delete.
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: API key permanently deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API key deleted successfully."
        '401':
          description: Unauthorized. No active WordPress session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You must be logged in to manage API keys."
                  error_code: 84
        '403':
          description: |
            Forbidden. The authenticated user does not own this API key and does not have
            administrator privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You are not allowed to manage this API key."
                  error_code: 84
        '404':
          description: No API key with the provided ID was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid API key ID."
                  error_code: 89
        '500':
          description: |
            Internal server error. The database delete operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Failed to delete API key."
                  error_code: 92
  /api-keys/{id}/revoke:
    post:
      tags:
        - api_keys
      summary: Revoke an API key
      description: |
        Soft-deletes (revokes) an API key by recording a `revoked_at` timestamp. The key
        record is retained in the database but is rejected by the authentication middleware.
        To permanently remove the record, use `DELETE /api-keys/{id}`.

        Regular users may only revoke their own keys. Administrators may revoke any key.
      operationId: revokeApiKey
      security:
        - WordPressSession: []
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric ID of the API key to revoke.
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: API key revoked successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API key revoked successfully."
        '401':
          description: Unauthorized. No active WordPress session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You must be logged in to manage API keys."
                  error_code: 84
        '403':
          description: |
            Forbidden. The authenticated user does not own this API key and does not have
            administrator privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "You are not allowed to manage this API key."
                  error_code: 84
        '404':
          description: No API key with the provided ID was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Invalid API key ID."
                  error_code: 89
        '500':
          description: |
            Internal server error. The database revoke operation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                success: false
                data:
                  message: "Failed to revoke API key."
                  error_code: 91
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT passed in the `Authorization` header as `Bearer <token>`.
        The header key name is configurable in plugin General Settings (default: `Authorization`).
        This scheme must be enabled in the plugin General Settings under "JWT from Header".
    QueryJWT:
      type: apiKey
      in: query
      name: JWT
      description: |
        JWT passed as a URL query parameter. The parameter name defaults to `JWT` but is
        configurable in plugin General Settings under "Request Keys".
    WordPressSession:
      type: apiKey
      in: cookie
      name: wordpress_logged_in
      description: |
        Active WordPress session cookie. Required for all `/api-keys` endpoints. The user
        must be authenticated in WordPress before calling API key management endpoints.
  schemas:
    ResponseError:
      type: object
      properties:
        success:
          type: boolean
          example: false
          description: Always `false` for error responses.
        data:
          type: object
          properties:
            message:
              type: string
              description: Human-readable error description.
              example: "An error occurred."
            error_code:
              type: number
              description: |
                Internal error code. Use this for programmatic error handling.
                See the plugin source (`ErrorCodes.php`) for the full list of codes.
              example: 22
    registerUserBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: test@simplejwtlogin.com
          description: User email address. Must be unique and well-formed.
        password:
          type: string
          description: Plaintext password for the new account.
        user_login:
          type: string
          nullable: true
          description: The user's login username. Defaults to the email address if omitted.
          example: myuser
        user_nicename:
          type: string
          nullable: true
          description: URL-friendly version of the username (used in author URLs).
          example: myuser
        user_url:
          type: string
          nullable: true
          description: URL associated with the user's profile.
          example: https://simplejwtlogin.com
        display_name:
          type: string
          nullable: true
          description: The user's display name. Defaults to `user_login` if omitted.
          example: My User
        nickname:
          type: string
          nullable: true
          description: The user's nickname. Defaults to `user_login` if omitted.
          example: myuser
        first_name:
          type: string
          nullable: true
          description: The user's first name.
          example: John
        last_name:
          type: string
          nullable: true
          description: The user's last name.
          example: Doe
        description:
          type: string
          nullable: true
          description: The user's biographical description.
          example: This is a sample description
        rich_editing:
          type: string
          nullable: true
          description: Whether to enable the rich-editor. Accepts `'true'` or `'false'` as a string literal. Defaults to `'true'`.
          example: "true"
        syntax_highlighting:
          type: string
          nullable: true
          description: Whether to enable the rich code editor. Accepts `'true'` or `'false'` as a string literal. Defaults to `'true'`.
          example: "true"
        comment_shortcuts:
          type: string
          nullable: true
          description: Whether to enable comment moderation keyboard shortcuts. Accepts `'true'` or `'false'` as a string literal. Defaults to `'false'`.
          example: "false"
        admin_color:
          type: string
          nullable: true
          description: Admin colour scheme for the user. Defaults to `'fresh'`.
          example: fresh
        use_ssl:
          type: boolean
          nullable: true
          description: Whether the user should always access the admin over HTTPS. Defaults to `false`.
          example: false
        user_registered:
          type: string
          nullable: true
          description: Registration date in `Y-m-d H:i:s` format. Defaults to the current date/time.
          example: "2022-01-31 23:15:30"
        user_activation_key:
          type: string
          nullable: true
          description: Password reset key. Defaults to empty.
        spam:
          type: boolean
          nullable: true
          description: Multisite only. Whether the user is marked as spam. Defaults to `false`.
          example: false
        show_admin_bar_front:
          type: string
          nullable: true
          description: Whether to display the Admin Bar on the front end. Accepts `'true'` or `'false'` as a string literal. Defaults to `'true'`.
          example: "true"
        locale:
          type: string
          nullable: true
          description: User's locale. Defaults to empty (inherits site locale).
          example: "en_US"
        user_meta:
          nullable: true
          description: |
            Optional user meta to set on the new account. Accepted as a JSON-encoded
            object string or as a plain object. Only keys listed in "Allowed user meta"
            in the plugin settings are stored; all others are silently discarded.
          example: '{"billing_city":"New York"}'
          oneOf:
            - type: string
            - type: object
              additionalProperties:
                type: string
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Register Requires Auth Code" is enabled in the plugin settings.
    authBody:
      type: object
      properties:
        email:
          type: string
          nullable: true
          example: john@doe.com
          description: User email address. Required when neither `username` nor `login` is provided.
        username:
          type: string
          nullable: true
          example: myuser
          description: WordPress login username. Required when neither `email` nor `login` is provided.
        login:
          type: string
          nullable: true
          example: myuser
          description: |
            Combined identifier accepted as either an email address or a WordPress login
            username. Required when neither `email` nor `username` is provided.
        password:
          type: string
          nullable: true
          description: User plaintext password. Required when `password_hash` is not provided.
        password_hash:
          type: string
          nullable: true
          description: |
            Hashed password as stored in the WordPress database. Requires "Allow login with
            password hash" to be enabled in the plugin settings. Required when `password`
            is not provided.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
    authRefreshBody:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "a1b2c3d4e5f678901234567890123456789012345678901234567890123456789012"
          description: Refresh token obtained from a prior `/auth` response.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
    validateBody:
      type: object
      required:
        - JWT
      properties:
        JWT:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          description: The JWT to validate.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
    authRevokeBody:
      type: object
      required:
        - JWT
      properties:
        JWT:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          description: The JWT to revoke. May be expired — the signature is still verified.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
    resetPasswordBody:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          example: contact@simplejwtlogin.com
          description: Email address of the account to reset.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Reset Password Requires Auth Code" is enabled.
    changePasswordBody:
      type: object
      required:
        - email
        - new_password
      properties:
        email:
          type: string
          example: contact@simplejwtlogin.com
          description: Email address of the account whose password to change.
        code:
          type: string
          nullable: true
          example: "MY_SECRET_CODE_RECEIVED_BY_EMAIL"
          description: |
            One-time reset code received by email (from `POST /user/reset_password`).
            Required in code-based reset flow; not required when `JWT` is provided and
            JWT-based reset is enabled.
        new_password:
          type: string
          example: "NewSecurePassword123!"
          description: The new password to set for the account.
        JWT:
          type: string
          nullable: true
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
          description: |
            Valid JWT for the user. When "Allow Reset Password with JWT" is enabled,
            supplying a `JWT` makes the `code` field optional. JWTs issued by a prior
            password-reset flow cannot be reused here.
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Reset Password Requires Auth Code" is enabled.
    oauthBody:
      type: object
      required:
        - provider
      properties:
        provider:
          type: string
          enum: [google, auth0, facebook, github]
          description: OAuth provider slug.
          example: google
        code:
          type: string
          nullable: true
          description: |
            Authorization code returned by the OAuth provider's consent screen.
            Used by Google, Auth0, Facebook, and GitHub.
          example: "4/0AfJohXmX..."
        id_token:
          type: string
          nullable: true
          description: |
            Google ID token from Sign In With Google (Google provider only). Can be
            supplied instead of `code` to obtain a WordPress JWT directly.
          example: "eyJhbGci..."
        access_token:
          type: string
          nullable: true
          description: |
            Provider access token passed directly by the client. Used by Facebook
            (`provider=facebook`) and GitHub (`provider=github`) instead of `code`.
          example: "EAABs..."
        AUTH_CODE:
          type: string
          nullable: true
          example: "MY_SUPER_SECRET_AUTH_CODE"
          description: Required when "Authentication Requires Auth Code" is enabled.
    OAuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            jwt:
              type: string
              nullable: true
              description: |
                Signed WordPress JWT for the authenticated user. Present when an
                `id_token` or `access_token` is supplied. Absent when `code` is
                supplied (the raw provider token response is returned instead).
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
            user:
              type: object
              nullable: true
              description: |
                WordPress user profile. Only present in flows that return user
                details alongside the JWT.
              properties:
                ID:
                  type: integer
                  example: 1
                user_login:
                  type: string
                  example: "myuser"
                user_email:
                  type: string
                  example: "myuser@simplejwtlogin.com"
                display_name:
                  type: string
                  example: "My User"
    createApiKeyBody:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          description: Human-readable name to identify the key.
          example: "My integration key"
        permissions:
          description: |
            Array (or comma-separated string) of permissions to grant.
            Valid values: `read`, `create`, `update`, `delete`.
          oneOf:
            - type: array
              items:
                type: string
                enum: [read, create, update, delete]
            - type: string
          example: ["read", "create"]
        expires_at:
          type: string
          nullable: true
          description: |
            Optional expiry date/time in `Y-m-d H:i:s` format. Omit (or pass `null`) for
            a non-expiring key.
          example: "2027-01-01 00:00:00"
    updateApiKeyBody:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          description: New human-readable name for the key.
          example: "Updated key name"
        permissions:
          description: |
            Updated permission set. Same format as for key creation.
            Valid values: `read`, `create`, `update`, `delete`.
          oneOf:
            - type: array
              items:
                type: string
                enum: [read, create, update, delete]
            - type: string
          example: ["read", "create", "update"]
        expires_at:
          type: string
          nullable: true
          description: |
            Updated expiry date/time in `Y-m-d H:i:s` format, or `null` to remove the
            expiry.
          example: "2028-06-01 00:00:00"
    twoFactorVerifyBody:
      type: object
      required:
        - code
      properties:
        JWT:
          type: string
          nullable: true
          description: |
            The interim JWT received in the `POST /auth` Two-Factor challenge response.
            Can be supplied here in the request body or via the `Authorization: Bearer`
            header.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        code:
          type: string
          description: |
            The 2FA verification code. Accepted formats depend on the user's configured
            provider: TOTP code (6-digit), email token, or backup code.
          example: "123456"
    ApiKeyItem:
      type: object
      properties:
        id:
          type: integer
          description: Database ID of the key.
          example: 7
        name:
          type: string
          description: Human-readable key name.
          example: "My integration key"
        key_prefix:
          type: string
          description: First 8 characters of the key followed by `****`.
          example: "sjl_a1b2****"
        permissions:
          type: array
          items:
            type: string
            enum: [read, create, update, delete]
          example: ["read", "create"]
        expires_at:
          type: string
          nullable: true
          description: Expiry timestamp in `Y-m-d H:i:s` format, or `null`.
          example: null
        last_used_at:
          type: string
          nullable: true
          description: Timestamp of last successful use, or `null` if never used.
          example: "2026-04-15 10:30:00"
        created_at:
          type: string
          description: Timestamp when the key was created.
          example: "2026-01-01 12:00:00"
        revoked_at:
          type: string
          nullable: true
          description: Timestamp when the key was revoked, or `null` if still active.
          example: null
        user_id:
          type: integer
          nullable: true
          description: WordPress user ID who owns this key. Only present in admin responses.
          example: 3
