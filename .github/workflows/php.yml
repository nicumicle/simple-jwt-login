name: "Check plugin code"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3.30'
        tools: composer

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    # - name: Cache Composer packages
    #   id: composer-cache
    #   uses: actions/cache@v4
    #   with:
    #     path: vendor
    #     key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
    #     restore-keys: |
    #       ${{ runner.os }}-php-

    - name: Check PHP Version
      run: php --version

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run PHPCS
      run: vendor/bin/phpcs --no-cache simple-jwt-login/ tests/ --extensions=php

    - name: Run PHPMD
      run: vendor/bin/phpmd simple-jwt-login/ text phpmd.xml

    - name: Run phpstan on plugin
      run: vendor/bin/phpstan analyse simple-jwt-login -c phpstan.neon --memory-limit=256M
