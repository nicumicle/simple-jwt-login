  description: Find out more about Simple-JWT-Login
  url: https://simplejwtlogin.com/docs
tags:
  - name: login_user
    description: |
      Auto-login a WordPress user by providing a valid JWT in the URL. The plugin validates
      the token, finds the matching user, and redirects the browser to the WordPress website
      (or a custom URL). Useful for passwordless login flows in mobile apps and email links.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/autologin
  - name: register_user
    description: |
      Register a new WordPress user account. The caller supplies at minimum an email address
      and password; all standard WordPress user fields are supported. An optional auth code
      can be required by the plugin settings to prevent open registration. On success the
      response includes the new user's profile and, optionally, a JWT.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/register-user
  - name: delete_user
    description: |
      Permanently delete a WordPress user identified by the JWT payload. The JWT must be
      valid and the calling IP must pass any IP allow-list configured in the plugin settings.
      An optional auth code can be required.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/delete_user
  - name: reset_password
    description: |
      Two-step password reset flow. First, `POST /user/reset_password` sends a one-time
      code to the user's email address. Then, `PUT /user/reset_password` uses that code
      (or a valid JWT when JWT-based reset is enabled) to set a new password.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/change-password
  - name: authenticate_user
    description: |
      Exchange WordPress credentials for a signed JWT (and optional refresh token). Related
      sub-operations: refresh an expired JWT, validate a token to retrieve user details,
      and revoke a token so it is rejected by future requests.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/authentication
  - name: oauth
    description: |
      OAuth 2.0 authorization-code flow for third-party providers (Google, Auth0). Exchange
      a provider-issued authorization code or ID token for a WordPress JWT. The provider
      must be enabled and configured in the plugin settings.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/oauth
  - name: api_keys
    description: |
      Manage long-lived API keys that can authenticate REST requests to any WordPress
      endpoint when the API key middleware is enabled. Keys are scoped to one or more
      permissions (`read`, `create`, `update`, `delete`). All endpoints in this group
      require an active WordPress session.
    externalDocs:
      description: Find out more
      url: https://www.simplejwtlogin.com/docs/api-keys
